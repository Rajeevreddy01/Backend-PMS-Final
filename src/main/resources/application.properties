# ─── Server ──────────────────────────────────────────────────────────────────
# Render injects PORT env var (10000 on free tier); fallback to 8080 locally
server.port=${PORT:8080}

# ─── PostgreSQL ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:pms_db}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── HikariCP connection pool ─────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ─── SQL Init ─────────────────────────────────────────────────────────────────
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:pmsSecretKeyForHMacSHA256Algorithm2024SuperLong!@#$%^&*}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed-origins=${FRONTEND_URL:http://localhost:5173},http://localhost:3000,http://localhost:4200

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.pms=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
# Suppress the CGLIB proxy warnings (harmless, just noise)
logging.level.org.springframework.aop=ERROR

# Break circular reference safety net
spring.main.allow-circular-references=true

# Remove explicit dialect — auto-detected from PostgreSQL driver
# (avoids HHH90000025 deprecation warning)
